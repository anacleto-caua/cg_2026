<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Three.js Activity</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
    <script>
      var scene = new THREE.Scene();

      // Camera
      var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(5, 5, 5);
      camera.lookAt(0, 0, 0);

      var renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Axes Helper (Red=X, Green=Y, Blue=Z)
      var axesHelper = new THREE.AxesHelper(5);
      scene.add(axesHelper);

      // Pink Sphere
      var sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
      var sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff66b2 });
      var sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
      scene.add(sphere);

      // Blue Cube
      var boxGeometry = new THREE.BoxGeometry(1, 1, 1);
      var boxMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
      var cube = new THREE.Mesh(boxGeometry, boxMaterial);
      cube.position.set(-2, 1, 0);
      cube.rotation.set(-.25, .5, 0);
      scene.add(cube);

      // Green Plane
      var planeGeometry = new THREE.PlaneGeometry(4, 4);
      var planeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
      var plane = new THREE.Mesh(planeGeometry, planeMaterial);
      plane.position.set(2, 2, -2);
      plane.rotation.set(-.2, .15, 0);
      scene.add(plane);

      // Main loop and kickstart
      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      animate();

      // Resize
      window.addEventListener('resize', onWindowResize, false);
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>

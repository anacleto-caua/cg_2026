<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Translação e Rotação - Terra Esférica</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #050510;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 15, 25);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0x222222);
      scene.add(ambientLight);

      const pointLight = new THREE.PointLight(0xffffff, 2, 100);
      pointLight.position.set(0, 0, 0);
      scene.add(pointLight);

      const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
      const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 });
      const sun = new THREE.Mesh(sunGeometry, sunMaterial);
      scene.add(sun);

      // '-'
      const texture = new THREE.TextureLoader().load('https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/a0bebea3-9ff6-49c3-895a-452cc5c9da63/dg3wwrg-880d1079-b478-4a1e-b512-af9c43a74537.png/v1/fill/w_1280,h_640,q_80,strp/earth_texture_map_with_clouds___1k___by_colourness_dg3wwrg-fullview.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NjQwIiwicGF0aCI6Ii9mL2EwYmViZWEzLTlmZjYtNDljMy04OTVhLTQ1MmNjNWM5ZGE2My9kZzN3d3JnLTg4MGQxMDc5LWI0NzgtNGExZS1iNTEyLWFmOWM0M2E3NDUzNy5wbmciLCJ3aWR0aCI6Ijw9MTI4MCJ9XV0sImF1ZCI6WyJ1cm46c2VydmljZTppbWFnZS5vcGVyYXRpb25zIl19._RUE__E4ZC3RjDfyn8nQQUeohkb4C7zhq9AYaCg8RZI');

      const earthGeometry = new THREE.SphereGeometry(1.5, 32, 32);
      const earthMaterial = new THREE.MeshStandardMaterial({ map: texture });
      const earth = new THREE.Mesh(earthGeometry, earthMaterial);
      scene.add(earth);

      let angle = 0;
      const orbitSpeed = 0.01;
      const rotationSpeed = 0.05;

      function animate() {
        requestAnimationFrame(animate);

        angle += orbitSpeed;
        earth.position.x = 10 * Math.cos(angle);
        earth.position.z = 10 * Math.sin(angle);

        earth.rotation.y += rotationSpeed;

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', onWindowResize, false);

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>

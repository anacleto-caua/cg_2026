<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Translação e Rotação - Terra Plana</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #050510;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 15, 25);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      const texLoader = new THREE.TextureLoader();


      const ambientLight = new THREE.AmbientLight(0xffffff, 0.02);
      scene.add(ambientLight);


      const earthTexture = texLoader.load("https://upload.wikimedia.org/wikipedia/commons/7/79/Flat_earth.jpg?_=20080615124701");

      const sideMaterial = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
      const topMaterial = new THREE.MeshStandardMaterial({ map: earthTexture });
      const bottomMaterial = new THREE.MeshStandardMaterial({ color: 0x2e2019 });

      const earthMaterials = [sideMaterial, topMaterial, bottomMaterial];

      const earthGeometry = new THREE.CylinderGeometry(15, 15, 0.5, 128);
      const earthMaterial = new THREE.MeshStandardMaterial({
          map: earthTexture,
          roughness: 1
      });
      const earth = new THREE.Mesh(earthGeometry, earthMaterials);
      earth.position.x = 0;
      earth.position.y = 0;
      earth.position.z = 0;
      earth.receiveShadow = true;
      earth.castShadow = true;
      scene.add(earth);


      const moonTexture = texLoader.load("https://threejs.org/examples/textures/planets/moon_1024.jpg");
      const moonGeometry = new THREE.SphereGeometry(0.8, 32, 32);
      const moonMaterial = new THREE.MeshStandardMaterial({
        map: moonTexture,
        roughness: 1
      });
      const moon = new THREE.Mesh(moonGeometry, moonMaterial);
      moon.position.x = 0;
      moon.position.y = 5;
      moon.position.z = 0;
      moon.castShadow = true;
      moon.receiveShadow = true;
      scene.add(moon);

      const sunTexture = texLoader.load("https://threejs.org/examples/textures/planets/moon_1024.jpg");
      const sunGeometry = new THREE.SphereGeometry(.8, 32, 32);
      const sunMaterial = new THREE.MeshBasicMaterial({
          map: sunTexture,
          color: 0xff9900
      });
      const sun = new THREE.Mesh(sunGeometry, sunMaterial);
      sun.position.x = 0;
      sun.position.y = 5;
      sun.position.z = 0;
      scene.add(sun);

      const pointLight = new THREE.PointLight(0xffffff, 50, 250);
      pointLight.castShadow = true;
      pointLight.shadow.mapSize.width = window.innerWidth;
      pointLight.shadow.mapSize.height = window.innerHeight;
      sun.add(pointLight);


      let angle = 0;
      const orbitSpeed = 0.015;
      const rotationSpeed = 0.0005;
      const orbitArc = 10;

      function animate() {
        requestAnimationFrame(animate);

        angle += orbitSpeed;

        moon.position.x = orbitArc * Math.cos(angle);
        moon.position.z = orbitArc * Math.sin(angle);

        sun.position.x = -orbitArc * Math.cos(angle);
        sun.position.z = -orbitArc * Math.sin(angle);

        moon.rotation.y += rotationSpeed;

        sun.rotation.y += rotationSpeed;

        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', onWindowResize, false);

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        pointLight.shadow.mapSize.width = window.innerWidth;
        pointLight.shadow.mapSize.height = window.innerHeight;
      }
    </script>
  </body>
</html>

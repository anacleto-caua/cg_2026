<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Three.js Activity</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/three@latest/build/three.min.js"></script>
    <script>
      var scene = new THREE.Scene();

      // Camera
      var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 15);
      camera.lookAt(0, 0, 0);

      var renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Paddle
      var paddleGeometry = new THREE.BoxGeometry(0.5, 4, 1);
      var paddleMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

      var paddle1 = new THREE.Mesh(paddleGeometry, paddleMaterial);
      paddle1.position.set(-10, 0, 0); // Left side
      scene.add(paddle1);

      var paddle2 = new THREE.Mesh(paddleGeometry, paddleMaterial);
      paddle2.position.set(10, 0, 0); // Right side
      scene.add(paddle2);

      // Red Sphere
      var ballGeometry = new THREE.SphereGeometry(0.4, 32, 32);
      var ballMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      var ball = new THREE.Mesh(ballGeometry, ballMaterial);
      scene.add(ball);

      // Game params
      var paddle_speed = 0.1;
      var ball_speed_x = 0.15;
      var ball_speed_y = 0.1;
      var field_y_cap = 10;
      var field_x_cap = 10;

      // Animation Loop
      function animate() {
        requestAnimationFrame(animate);

        // Move the ball
        ball.position.x += ball_speed_x;
        ball.position.y += ball_speed_y;

        // Y collision
        if (ball.position.y >= field_y_cap || ball.position.y <= -field_y_cap) {
          ball_speed_y = -ball_speed_y;
        }

        // X collision
        if (ball.position.x >= field_x_cap || ball.position.x <= -field_x_cap) {
          ball_speed_x = -ball_speed_x;
        }

        // Paddles AI - just follow the ball arround
        paddle1.position.y += (ball.position.y - paddle1.position.y) * paddle_speed;
        paddle2.position.y += (ball.position.y - paddle2.position.y) * paddle_speed;

        renderer.render(scene, camera);
      }

      animate();

      // Resize
      window.addEventListener('resize', onWindowResize, false);
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
